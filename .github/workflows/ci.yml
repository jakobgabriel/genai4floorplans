name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # The server package + its route tests need a generated Prisma client;
      # without it the suite fails at collection with `Role is undefined`.
      - name: Generate Prisma client
        run: npm run prisma:generate -w @flowplan/server

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm run test
