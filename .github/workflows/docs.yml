name: Docs

# Build the Docusaurus documentation site (narrative pages from docs/ + the
# TypeDoc-generated engine API) and publish it to GitHub Pages on every push to
# main. Docusaurus and TypeDoc are both open-source (MIT); the site is fully
# static and self-hosted on Pages.
#
# One-time setup: Settings → Pages → Build and deployment → Source: GitHub Actions.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # Root install so TypeDoc can resolve @flowplan/core's sources/types.
      - name: Install monorepo dependencies
        run: npm ci

      # The docs site is a standalone package (own node_modules, no type:module)
      # so Docusaurus's SSR build is isolated from the ESM monorepo root.
      - name: Install docs dependencies
        run: npm --prefix docs-site ci

      - name: Build docs (TypeDoc API + Docusaurus)
        run: npm --prefix docs-site run build

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs-site/build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
