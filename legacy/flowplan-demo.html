<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<meta name="theme-color" content="#0e1416" />
<title>FlowPlan — Layout Rating</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root{--bg:#0e1416;--panel:#141d20;--panel2:#19262a;--line:#24383d;--teal:#2bb6a8;--tealDim:#1c6f68;--amber:#e0a458;--red:#d96b5b;--text:#dde8e8;--textDim:#7e9698;}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:'IBM Plex Mono',ui-monospace,Menlo,monospace;font-size:13px;overflow-x:hidden;}
  button{font-family:inherit;cursor:pointer;}
  .wrap{display:flex;flex-direction:column;min-height:100vh;}
  header{padding:11px 14px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:10px;flex-wrap:wrap;position:sticky;top:0;background:var(--bg);z-index:5;}
  .logo{font-family:'IBM Plex Sans',sans-serif;font-weight:700;font-size:15px;letter-spacing:.5px;}
  .logo span{color:var(--teal);}
  .btn{background:var(--panel2);color:var(--text);border:1px solid var(--line);padding:8px 12px;border-radius:5px;font-size:12px;letter-spacing:.3px;}
  .btn.on{background:var(--teal);color:var(--bg);border-color:var(--teal);}
  .btn.sm{padding:5px 9px;font-size:11px;}
  .views{display:flex;gap:6px;}
  .spacer{flex:1;}
  main{display:flex;flex:1;min-width:0;}
  .canvas{flex:1 1 auto;padding:14px;overflow:auto;min-width:0;}
  .side{width:360px;flex:0 0 360px;border-left:1px solid var(--line);background:var(--panel);overflow:auto;}
  .layoutTitle{font-family:'IBM Plex Sans',sans-serif;font-weight:700;font-size:12px;letter-spacing:.5px;margin-bottom:6px;}
  svg{background:var(--panel);border-radius:8px;border:1px solid var(--line);touch-action:none;max-width:100%;height:auto;display:block;}
  .legend{display:flex;gap:14px;margin-top:12px;font-size:10.5px;color:var(--textDim);flex-wrap:wrap;}
  .hint{font-size:11px;color:var(--textDim);margin-top:8px;}
  .tabs{display:flex;gap:6px;padding:12px;border-bottom:1px solid var(--line);flex-wrap:wrap;}
  .tabs .btn{flex:1;min-width:64px;}
  .pad{padding:16px;}
  .grade{display:flex;align-items:center;gap:14px;margin-bottom:12px;}
  .gradeBox{width:56px;height:56px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:30px;font-weight:700;font-family:'IBM Plex Sans',sans-serif;}
  .lab{font-size:10px;color:var(--textDim);text-transform:uppercase;letter-spacing:.5px;}
  .kpi{margin-bottom:9px;}
  .kpiTop{display:flex;justify-content:space-between;font-size:11px;color:var(--textDim);margin-bottom:3px;}
  .bar{height:5px;background:var(--panel2);border-radius:2px;overflow:hidden;}
  .bar>div{height:100%;}
  .imp{background:var(--panel2);border:1px solid var(--tealDim);border-radius:8px;padding:12px;margin:14px 0;}
  .impVal{font-size:22px;font-weight:600;color:var(--teal);}
  .field{display:block;margin-bottom:8px;}
  .field>span{font-size:10px;color:var(--textDim);text-transform:uppercase;letter-spacing:.4px;display:block;margin-bottom:3px;}
  input,select,textarea{background:var(--bg);color:var(--text);border:1px solid var(--line);border-radius:4px;padding:7px;font-size:12px;font-family:inherit;width:100%;}
  .row2{display:flex;gap:8px;}
  .splitWrap{display:flex;gap:18px;flex-wrap:wrap;}
  .card{background:var(--panel2);border:1px solid var(--line);border-radius:7px;padding:10px;margin-bottom:8px;}
  .pill{display:inline-block;padding:2px 7px;border-radius:10px;font-size:10px;letter-spacing:.3px;}
  .issue{border-left:3px solid var(--red);padding:7px 10px;background:rgba(217,107,91,.08);border-radius:4px;margin-bottom:6px;font-size:11.5px;cursor:pointer;}
  .ok{border-left:3px solid var(--teal);padding:7px 10px;background:rgba(43,182,168,.08);border-radius:4px;font-size:11.5px;}
  code{background:var(--bg);padding:1px 5px;border-radius:3px;color:var(--teal);font-size:11px;}
  .schemaTbl{width:100%;border-collapse:collapse;font-size:11px;margin-bottom:14px;}
  .schemaTbl td,.schemaTbl th{border:1px solid var(--line);padding:5px 7px;text-align:left;vertical-align:top;}
  .schemaTbl th{color:var(--textDim);text-transform:uppercase;font-size:9.5px;letter-spacing:.4px;}
  #err{display:none;padding:16px;margin:16px;border:1px solid var(--red);border-radius:8px;background:rgba(217,107,91,.1);color:var(--red);white-space:pre-wrap;font-size:12px;}
  @media (max-width:820px){
    main{flex-direction:column;}
    .side{width:100%;flex:0 0 auto;border-left:none;border-top:1px solid var(--line);}
    header{gap:8px;}
    .views .btn{padding:8px 10px;font-size:11px;}
    .modelName{display:none;}
    .splitWrap{flex-direction:column;}
  }
</style>
</head>

<script>

<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script>
(function(){
  if(!window.React||!window.ReactDOM){
    var d=document.getElementById('err');d.style.display='block';
    d.textContent='Could not load React from the network. This file needs internet access the first time you open it. Reconnect and reload.';
    return;
  }
  var React=window.React, ReactDOM=window.ReactDOM;
  var useState=React.useState,useMemo=React.useMemo,useRef=React.useRef,useCallback=React.useCallback,useEffect=React.useEffect;
  var h=React.createElement;

  // ============================ DATA MODEL ====================================
  var SAMPLE = {
    name:"Cell A — Hydrobuchse line (demo)", gridW:22, gridH:14,
    stations:[
      {id:"raw",name:"Raw Material",role:"input",type:"store",x:1,y:6,w:3,h:2,fixed:true,auto:"manual",autoOverride:null,capacityPerShift:2000,operators:0,cycleTimeSec:0,utilities:[],ergoRisk:"low",changeoverMin:0,notes:"Inbound staging"},
      {id:"cnc",name:"CNC Turning",role:"process",type:"machine",x:6,y:2,w:3,h:3,fixed:false,auto:"auto",autoOverride:null,capacityPerShift:1300,operators:1,cycleTimeSec:42,utilities:["power","air","coolant"],ergoRisk:"low",changeoverMin:25,notes:"Siemens S7 controlled"},
      {id:"press",name:"Press",role:"process",type:"machine",x:11,y:2,w:4,h:3,fixed:true,auto:"semi",autoOverride:null,capacityPerShift:1250,operators:1,cycleTimeSec:38,utilities:["power","hydraulic"],ergoRisk:"med",changeoverMin:40,notes:"Anchored — foundation pit"},
      {id:"assembly",name:"Assembly",role:"process",type:"manual",x:11,y:9,w:3,h:3,fixed:false,auto:"manual",autoOverride:null,capacityPerShift:1150,operators:3,cycleTimeSec:95,utilities:["power","air"],ergoRisk:"high",changeoverMin:10,notes:"Manual workstation, 3 operators"},
      {id:"qa",name:"QA / Inspection",role:"process",type:"quality",x:6,y:9,w:3,h:2,fixed:false,auto:"semi",autoOverride:null,capacityPerShift:1200,operators:1,cycleTimeSec:30,utilities:["power"],ergoRisk:"low",changeoverMin:5,notes:"nLine surface inspection"},
      {id:"ship",name:"Shipping",role:"output",type:"store",x:18,y:6,w:3,h:2,fixed:true,auto:"manual",autoOverride:null,capacityPerShift:2000,operators:1,cycleTimeSec:0,utilities:[],ergoRisk:"low",changeoverMin:0,notes:"Outbound dock"}
    ],
    flows:[
      {from:"raw",to:"cnc",volume:1200,unitCost:0.05,transport:"forklift",partWeightKg:2.4,notes:""},
      {from:"cnc",to:"press",volume:1200,unitCost:0.05,transport:"forklift",partWeightKg:2.4,notes:""},
      {from:"press",to:"assembly",volume:1150,unitCost:0.04,transport:"conveyor",partWeightKg:2.1,notes:""},
      {from:"assembly",to:"qa",volume:1100,unitCost:0.06,transport:"manual",partWeightKg:2.1,notes:""},
      {from:"qa",to:"ship",volume:1050,unitCost:0.05,transport:"forklift",partWeightKg:2.1,notes:""}
    ],
    noGoZones:[]
  };
  var STATION_TYPES=["machine","manual","quality","store","buffer"];
  var ROLES=["input","process","output"];
  var AUTO=["manual","semi","auto"];
  var ERGO=["low","med","high"];
  var TYPE_COL={machine:"#16343a",manual:"#2a2f1e",quality:"#1e2a36",store:"#2a2320",buffer:"#241e2a"};
  var ERGO_COL={low:"#2bb6a8",med:"#e0a458",high:"#d96b5b"};
  var AUTO_COL={manual:"#d96b5b",semi:"#e0a458",auto:"#2bb6a8"};
  var TEAL="#2bb6a8",TEALD="#1c6f68",AMBER="#e0a458",RED="#d96b5b",TEXT="#dde8e8",TEXTD="#7e9698",LINE="#24383d",PANEL2="#19262a";

  function center(s){return {x:s.x+s.w/2,y:s.y+s.h/2};}
  function rectDist(a,b){var ca=center(a),cb=center(b);return Math.abs(ca.x-cb.x)+Math.abs(ca.y-cb.y);}

  function computeKPIs(stations,flows,grid){
    var byId={};stations.forEach(function(s){byId[s.id]=s;});
    var flowCost=0,travel=0,congestion=0,flowDetail=[],corridorY=grid.gridH/2;
    flows.forEach(function(f){var a=byId[f.from],b=byId[f.to];if(!a||!b)return;
      var d=rectDist(a,b),cost=f.volume*d*f.unitCost,trav=f.volume*d;
      flowCost+=cost;travel+=trav;
      var ya=center(a).y,yb=center(b).y;if((ya-corridorY)*(yb-corridorY)<0)congestion+=f.volume*d;
      flowDetail.push(Object.assign({},f,{dist:+d.toFixed(2),cost:cost,travel:trav}));});
    return {flowCost:flowCost,travel:travel,congestion:congestion,flowDetail:flowDetail};
  }
  function optimize(stations,flows,grid){
    var best=stations.map(function(s){return Object.assign({},s);});
    var bestCost=computeKPIs(best,flows,grid).flowCost;
    var movable=[];best.forEach(function(s,i){if(!s.fixed)movable.push(i);});
    var improved=true,guard=0;
    while(improved&&guard<300){improved=false;guard++;
      for(var a=0;a<movable.length;a++)for(var b=a+1;b<movable.length;b++){
        var i=movable[a],j=movable[b];var trial=best.map(function(s){return Object.assign({},s);});
        var tx=trial[i].x,ty=trial[i].y;trial[i].x=trial[j].x;trial[i].y=trial[j].y;trial[j].x=tx;trial[j].y=ty;
        var c=computeKPIs(trial,flows,grid).flowCost;
        if(c<bestCost-1e-9){best=trial;bestCost=c;improved=true;}}}
    return best;
  }
  var WEIGHTS={flowCost:0.25,travel:0.15,congestion:0.10,placement:0.10,balance:0.20,ergo:0.10,auto:0.10};
  function gradeLetter(s){return s>=90?"A":s>=80?"B":s>=70?"C":s>=60?"D":"E";}
  function scoreVsFloor(a,f){if(a<=0)return 100;if(f<=0)return 100;return Math.max(0,Math.min(100,(f/a)*100));}
  function buildRating(stations,flows,grid){
    var actual=computeKPIs(stations,flows,grid);
    var optimized=optimize(stations,flows,grid);var opt=computeKPIs(optimized,flows,grid);
    var sFlow=scoreVsFloor(actual.flowCost,opt.flowCost);
    var sTravel=scoreVsFloor(actual.travel,opt.travel);
    var sCong=scoreVsFloor(actual.congestion,opt.congestion||actual.congestion);
    var sPlace=sFlow;
    var bal=balanceAnalysis(stations);var sBal=bal.score;
    var sErgo=ergoScore(stations,flows);
    var chainR=chainRating(stations,flows);var sAuto=autoCoherenceScore(chainR);
    var composite=sFlow*WEIGHTS.flowCost+sTravel*WEIGHTS.travel+sCong*WEIGHTS.congestion+sPlace*WEIGHTS.placement+sBal*WEIGHTS.balance+sErgo*WEIGHTS.ergo+sAuto*WEIGHTS.auto;
    var flowReductionPct=actual.flowCost>0?((actual.flowCost-opt.flowCost)/actual.flowCost)*100:0;
    var total=actual.flowCost||1,cum=0;
    var pareto=actual.flowDetail.slice().sort(function(a,b){return b.cost-a.cost;}).map(function(f){cum+=f.cost;return Object.assign({},f,{share:(f.cost/total)*100});});
    var byIdOpt={};optimized.forEach(function(s){byIdOpt[s.id]=s;});var moves=[];
    stations.forEach(function(s){var o=byIdOpt[s.id];if(o&&(o.x!==s.x||o.y!==s.y))moves.push({id:s.id,name:s.name});});
    return {actual:actual,optimized:optimized,opt:opt,scores:{flowCost:sFlow,travel:sTravel,congestion:sCong,placement:sPlace,balance:sBal,ergo:sErgo,auto:sAuto},composite:composite,letter:gradeLetter(composite),flowReductionPct:flowReductionPct,pareto:pareto,moves:moves,balance:bal};
  }

  function validateFlow(stations,flows){
    var byId={};stations.forEach(function(s){byId[s.id]=s;});
    var out={},inn={};stations.forEach(function(s){out[s.id]=0;inn[s.id]=0;});
    flows.forEach(function(f){if(byId[f.from])out[f.from]++;if(byId[f.to])inn[f.to]++;});
    var issues=[];
    stations.forEach(function(s){
      if(s.role!=="output"&&out[s.id]===0)issues.push({sev:"err",id:s.id,msg:s.name+": dead end — no outgoing flow (and not an output area)."});
      if(s.role!=="input"&&inn[s.id]===0)issues.push({sev:"err",id:s.id,msg:s.name+": orphan — no incoming flow (and not an input area)."});
      if(s.role==="input"&&inn[s.id]>0)issues.push({sev:"warn",id:s.id,msg:s.name+": input area has incoming flow — usually a source only."});
      if(s.role==="output"&&out[s.id]>0)issues.push({sev:"warn",id:s.id,msg:s.name+": output area has outgoing flow — usually a sink only."});
    });
    var inputs=stations.filter(function(s){return s.role==="input";}).map(function(s){return s.id;});
    var adj={};stations.forEach(function(s){adj[s.id]=[];});flows.forEach(function(f){if(adj[f.from])adj[f.from].push(f.to);});
    var seen={};var stack=inputs.slice();while(stack.length){var n=stack.pop();if(seen[n])continue;seen[n]=1;(adj[n]||[]).forEach(function(m){stack.push(m);});}
    stations.forEach(function(s){if(s.role!=="input"&&!seen[s.id])issues.push({sev:"warn",id:s.id,msg:s.name+": not reachable from any input area."});});
    if(inputs.length===0)issues.push({sev:"err",id:null,msg:"No input area defined — set a station's role to 'input'."});
    if(!stations.some(function(s){return s.role==="output";}))issues.push({sev:"err",id:null,msg:"No output area defined — set a station's role to 'output'."});
    return {issues:issues,valid:issues.filter(function(i){return i.sev==="err";}).length===0};
  }

  function autoHeuristic(s){
    var score=50;
    if(s.type==="machine")score+=25;if(s.type==="quality")score+=10;if(s.type==="manual")score-=20;
    if(s.role==="input"||s.role==="output")score-=10;
    if(s.ergoRisk==="high")score+=20;else if(s.ergoRisk==="med")score+=8;
    if(s.cycleTimeSec>0&&s.cycleTimeSec<30)score+=10;
    if(s.changeoverMin>30)score-=10;
    if(s.capacityPerShift>1500)score+=8;
    if(s.operators>=3)score+=10;
    return Math.max(0,Math.min(100,score));
  }
  function autoPotential(s){
    if(s.autoOverride==="yes")return {pct:90,src:"override",verdict:"Automate"};
    if(s.autoOverride==="no")return {pct:10,src:"override",verdict:"Keep manual"};
    var pct=autoHeuristic(s);
    var verdict=pct>=70?"Automate":pct>=45?"Consider":"Keep manual";
    return {pct:pct,src:"heuristic",verdict:verdict};
  }
  function chainRating(stations,flows){
    var byId={};stations.forEach(function(s){byId[s.id]=s;});
    var links=flows.map(function(f){var a=byId[f.from],b=byId[f.to];var kind="manual";
      if(a&&b){var aA=a.auto==="auto",bA=b.auto==="auto";var handoffAuto=f.transport==="conveyor"||f.transport==="agv";
        if(aA&&bA&&handoffAuto)kind="chained-auto";else if(aA&&bA&&!handoffAuto)kind="auto-island";else if(aA||bA)kind="mixed";else kind="manual";}
      return Object.assign({},f,{kind:kind});});
    var islands=links.filter(function(l){return l.kind==="auto-island";}).length;
    return {links:links,islands:islands};
  }

  // effective parts/shift a process step can output
  function stationRate(s){
    var byCycle = s.cycleTimeSec>0 ? Math.floor((3600/s.cycleTimeSec)*8*Math.max(1,s.operators)) : Infinity; // 8h shift, operators ~ parallelism for manual
    var cap = s.capacityPerShift>0 ? s.capacityPerShift : Infinity;
    var r = Math.min(byCycle, cap);
    return isFinite(r) ? r : (cap===Infinity?byCycle:cap);
  }
  function balanceAnalysis(stations){
    var proc=stations.filter(function(s){return s.role==="process";});
    if(proc.length===0)return {steps:[],bottleneck:null,lineOut:0,score:100,takt:0};
    var steps=proc.map(function(s){var rate=stationRate(s);return {id:s.id,name:s.name,rate:isFinite(rate)?rate:0,cycle:s.cycleTimeSec,util:0};});
    var finite=steps.filter(function(x){return x.rate>0;});
    var lineOut=finite.length?Math.min.apply(null,finite.map(function(x){return x.rate;})):0;
    var maxRate=finite.length?Math.max.apply(null,finite.map(function(x){return x.rate;})):0;
    steps.forEach(function(x){x.util=x.rate>0?Math.round((lineOut/x.rate)*100):0;});
    var bottleneck=null;steps.forEach(function(x){if(x.rate===lineOut&&x.rate>0&&!bottleneck)bottleneck=x;});
    // balance score: line output relative to mean step rate (perfectly balanced => 100)
    var mean=finite.length?finite.reduce(function(a,x){return a+x.rate;},0)/finite.length:0;
    var score=mean>0?Math.max(0,Math.min(100,(lineOut/mean)*100)):100;
    var takt=lineOut>0?+(28800/lineOut).toFixed(1):0; // sec/part across 8h
    return {steps:steps,bottleneck:bottleneck,lineOut:lineOut,maxRate:maxRate,score:Math.round(score),takt:takt};
  }
  function ergoScore(stations,flows){
    var load={};stations.forEach(function(s){load[s.id]=0;});
    flows.forEach(function(f){load[f.from]=(load[f.from]||0)+f.volume;load[f.to]=(load[f.to]||0)+f.volume;});
    var totalVol=0,risk=0;
    stations.forEach(function(s){if(s.role!=="process")return;var w=load[s.id]||0;totalVol+=w;
      var rf=s.ergoRisk==="high"?1:s.ergoRisk==="med"?0.4:0;risk+=rf*w;});
    if(totalVol===0)return 100;
    return Math.round(Math.max(0,Math.min(100,100-(risk/totalVol)*100)));
  }
  function autoCoherenceScore(chain){
    var n=chain.links.length||1;var islands=chain.islands;
    return Math.round(Math.max(0,Math.min(100,100-(islands/n)*100)));
  }

  function cellTemplate(form,n,grid){
    var slots=[],top=2,bottom=grid.gridH-4,left=2,right=grid.gridW-4;
    if(n<=0)return slots;
    if(form==="I"){var step=(right-left)/Math.max(1,n-1);for(var i=0;i<n;i++)slots.push({x:Math.round(left+step*i),y:Math.round(grid.gridH/2-1)});}
    else if(form==="U"){var half=Math.ceil(n/2);var sx=(right-left)/Math.max(1,half-1);
      for(var a=0;a<half;a++)slots.push({x:Math.round(left+sx*a),y:top});
      for(var b=half;b<n;b++)slots.push({x:Math.round(right-sx*(b-half)),y:bottom});}
    else if(form==="L"){var vN=Math.ceil(n/2),hN=n-vN;var sy=(bottom-top)/Math.max(1,vN-1);
      for(var c=0;c<vN;c++)slots.push({x:left,y:Math.round(top+sy*c)});
      var sxx=(right-left)/Math.max(1,hN);for(var d=0;d<hN;d++)slots.push({x:Math.round(left+sxx*(d+1)),y:bottom});}
    else if(form==="S"){var per=Math.ceil(n/2);var sX=(right-left)/Math.max(1,per-1);
      for(var e=0;e<per;e++)slots.push({x:Math.round(left+sX*e),y:top});
      for(var g=per;g<n;g++)slots.push({x:Math.round(left+sX*(g-per)),y:bottom});}
    return slots;
  }

  // ============================ COMPONENTS (no JSX) ==========================
  function LayoutSVG(p){
    var model=p.model,stations=p.stations,flows=p.flows,ghost=p.ghost,chain=p.chain,template=p.template,
        selId=p.selId,onSelect=p.onSelect,onDragStart=p.onDragStart,cell=p.cell,label=p.label,badge=p.badge;
    var PAD=12;var byId={};stations.forEach(function(s){byId[s.id]=s;});
    var W=model.gridW*cell+PAD*2,H=model.gridH*cell+PAD*2;
    var linkKind={};(chain?chain.links:[]).forEach(function(l){linkKind[l.from+">"+l.to]=l.kind;});
    var kids=[];
    for(var i=0;i<=model.gridW;i++)kids.push(h("line",{key:"v"+i,x1:PAD+i*cell,y1:PAD,x2:PAD+i*cell,y2:PAD+model.gridH*cell,stroke:LINE,strokeWidth:0.5,opacity:0.5}));

            h(Field,{label:"Role (I/O flexible)"},h("select",{value:selStation.role,onChange:function(e){updateStation(selStation.id,{role:e.target.value});}},ROLES.map(function(t){return h("option",{key:t},t);}))),

            h(Field,{label:"Automate? (override)"},h("select",{value:selStation.autoOverride||"auto",onChange:function(e){updateStation(selStation.id,{autoOverride:e.target.value==="auto"?null:e.target.value});}},h("option",{value:"auto"},"heuristic"),h("option",{value:"yes"},"force yes"),h("option",{value:"no"},"force no")))),
          h("div",{className:"row2"},
            h(Field,{label:"Capacity/shift"},h("input",{type:"number",value:selStation.capacityPerShift,onChange:function(e){updateStation(selStation.id,{capacityPerShift:+e.target.value});}})),
            h(Field,{label:"Operators"},h("input",{type:"number",value:selStation.operators,onChange:function(e){updateStation(selStation.id,{operators:+e.target.value});}}))),
          h("div",{className:"row2"},
            h(Field,{label:"Cycle time (s)"},h("input",{type:"number",value:selStation.cycleTimeSec,onChange:function(e){updateStation(selStation.id,{cycleTimeSec:+e.target.value});}})),
            h(Field,{label:"Changeover (min)"},h("input",{type:"number",value:selStation.changeoverMin,onChange:function(e){updateStation(selStation.id,{changeoverMin:+e.target.value});}}))),
          h(Field,{label:"Ergonomic risk"},h("select",{value:selStation.ergoRisk,onChange:function(e){updateStation(selStation.id,{ergoRisk:e.target.value});}},ERGO.map(function(t){return h("option",{key:t},t);}))),
